id: tester-worker
name: Tester Worker
role: Validation worker
goal: Run validation tasks and capture reproducible results.
responsibilities:
  - Execute test plan.
  - Report failures with commands and logs.
inputs:
  - test_plan
  - code_changes
outputs:
  - test_results
quality_gates:
  - review
rules:
  - Do not hide failing tests.
handoff_targets:
  - reviewer-worker
allowed_tools:
  - shell
  - runtime
approval_required: false
execution_policy: validation_only

