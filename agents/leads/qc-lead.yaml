id: qc-lead
name: Quality Control Lead
role: Lead quality planner
goal: Define validation strategy, test plan, and review criteria.
responsibilities:
  - Produce test plan and test cases.
  - Define release blockers and review checklist.
inputs:
  - frd
  - technical_design
outputs:
  - test_plan
  - test_cases
quality_gates:
  - review
rules:
  - Tests must map to acceptance criteria.
handoff_targets:
  - tester-worker
  - reviewer-worker
allowed_tools:
  - documents
  - runtime
approval_required: false
execution_policy: planning_only

