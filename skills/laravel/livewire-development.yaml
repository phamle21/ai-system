## CONTEXT

Livewire 4.1 with Laravel 13. For Daily Logwork project specifically: class-based components in `App\Livewire\[Module]\[Component]` with views in `resources/views/livewire/[module]/[component].blade.php`.

---

## COMPONENT FORMATS

### Class-Based (Daily Logwork convention)
```bash
php artisan make:livewire DailyReport\Index
```
Creates: `app/Livewire/DailyReport/Index.php` + `resources/views/livewire/daily-report/index.blade.php`

### Single-File Component (SFC - Livewire 4 default)
```bash
php artisan make:livewire create-post
```
Creates: `resources/views/components/⚡create-post.blade.php`

### Converting Between Formats
```bash
php artisan livewire:convert create-post
```

---

## BASIC USAGE

### Class-Based Component Example
```php
<?php

namespace App\Livewire\DailyReport;

use Livewire\Component;

class Index extends Component
{
    public string $project = '';
    public string $reportDate = '';
    public array $todayTasks = [];
    public array $tomorrowTasks = [];
    public int $qualityRating = 0;
    public int $spiritRating = 0;
    public string $notes = '';
    public bool $submitToGform = false;

    public function mount(): void
    {
        $this->reportDate = today()->toDateString();
    }

    public function addTodayTask(): void
    {
        $this->todayTasks[] = [
            'id' => uniqid(),
            'description' => '',
            'progress' => 0,
            'expected_date' => today()->toDateString(),
        ];
    }

    public function removeTodayTask(string $id): void
    {
        if (count($this->todayTasks) > 1) {
            $this->todayTasks = array_values(array_filter(
                $this->todayTasks,
                fn($t) => $t['id'] !== $id
            ));
        }
    }

    public function save(): void
    {
        $this->validate([
            'project' => 'required|string',
            'reportDate' => 'required|date',
            'todayTasks' => 'required|array|min:1',
            'todayTasks.*.description' => 'required|string|max:500',
            'todayTasks.*.progress' => 'required|integer|min:0|max:100',
            'qualityRating' => 'required|integer|min:1|max:5',
            'spiritRating' => 'required|integer|min:1|max:5',
        ]);

        // Save logic here
        session()->flash('message', 'Report saved successfully!');
        $this->redirectRoute('daily-report');
    }

    public function render()
    {
        return view('livewire.daily-report.index', [
            'projectOptions' => \App\Models\DailyReport::getProjectOptions(),
        ]);
    }
}
```

