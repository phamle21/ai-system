## LIVERWIRE 4 SPECIFICS

### New Features
- Islands (`@island`) for isolated update regions
- Async actions (`wire:click.async`, `#[Async]`) for parallel execution
- Deferred/bundled loading: `defer`, `lazy.bundle`

### New Directives
- `wire:sort` — drag-and-drop sorting
- `wire:intersect` — viewport intersection detection
- `wire:ref` — element references for JS

### Key Changes From v3
- `wire:model` now ignores child events by default (use `wire:model.deep`)
- `wire:scroll` renamed to `wire:navigate:scroll`
- JavaScript: `$wire.$js('name', fn)` → `$wire.$js.name = fn`

---

## BEST PRACTICES

- Always use `wire:key` in loops
- Use `wire:loading` for loading states
- Validate in action methods (treat like HTTP requests)
- Separate Blade templates into small reusable partials
- Use `wire:poll` for periodic updates (non-blocking)
- Test with `Livewire::test(Component::class)->call('action')->assertSet('prop', value)`

## COMMON PITFALLS

- Missing `wire:key` in loops → unexpected re-rendering
- Expecting `wire:model` real-time → use `wire:model.live`
- Unclosed component tags → syntax errors in v4
- Forgetting `array_values()` after `array_filter()` on indexed arrays
- Including Alpine.js separately (already bundled in Livewire 4)

