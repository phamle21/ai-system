## RULES

### Reactivity
- Public properties are reactive — `wire:model` binds to them
- `wire:model.live` for instant updates (selects, text inputs)
- `wire:model.defer` for batched updates (non-critical fields like notes)
- `wire:model.debounce-500ms` for textareas
- `wire:model.deep` for nested array bindings

### Dynamic Lists
- Always use `wire:key` on all dynamic lists
- Generate unique IDs with `uniqid()` for dynamic list items
- Reindex arrays with `array_values()` after `array_filter()`
- Minimum 1 item check before allowing removal

### Form Handling
- Validate with `$this->validate()` — use Laravel validation rules
- Use `$this->addError()` for field-level errors
- Use `$this->dispatch()` for events (SweetAlert2, flash messages)
- Use `$this->redirectRoute()` for navigation after success
- Form submission: `wire:submit="save"`

### Lifecycle Hooks
- `mount()` to initialize component state
- `render()` to return view and pass data
- Action methods for user interactions

