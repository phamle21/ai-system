## COMMON PATTERNS

### Add item
```php
public function addTask(): void {
    $this->tasks[] = ['id' => uniqid(), 'description' => '', 'progress' => 0];
}
```

### Remove item
```php
public function removeTask(string $id): void {
    if (count($this->tasks) > 1) {
        $this->tasks = array_values(array_filter(
            $this->tasks, fn($t) => $t['id'] !== $id
        ));
    }
}
```

### Update item
```php
public function updateTask(string $id, string $field, mixed $value): void {
    foreach ($this->tasks as &$task) {
        if ($task['id'] === $id) {
            $task[$field] = $value;
            break;
        }
    }
}
```

### Save with flash message
```php
public function save(): void {
    $this->validate([...]);
    // Business logic...
    session()->flash('message', 'Success!');
    $this->redirectRoute('route.name');
}
```

