name: thickbox
description: WordPress ThickBox modal dialog — iframe and inline modals in wp-admin
version: 1.0

when_to_use:
  - opening iframe modals from admin buttons (import, export, sync, etc.)
  - creating custom admin modals for forms or content
  - loading external admin pages inside thickbox
  - handling modal close/refresh parent behavior
  - passing data between parent page and modal iframe

