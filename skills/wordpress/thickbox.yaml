#           if (window.parent.tb_remove) {
#               window.parent.tb_remove();
#           } else {
#               tb_remove();
#           }
#       }
#   });
#
# Close + redirect parent:
#
#   // PHP:
#   wp_send_json_success([
#       'close'    => true,
#       'redirect' => admin_url('edit.php?post_type=my_cpt'),
#   ]);
#
#   // JS:
#   if (response.data.redirect && window.parent.location) {
#       window.parent.location.href = response.data.redirect;
#   }
#
# Key points:
# - window.parent.tb_remove() closes thickbox from inside iframe
# - window.parent.location.href() redirects parent page
# - Always check window.parent exists before accessing
# - class="thickbox-close" for simple cancel/close buttons

# ============================================================
# RULES
# ============================================================
rules:
  - Thickbox trigger: use tb_iframe=1 + width/height query params on any admin URL
  - Must add .thickbox class to trigger (auto-initializes via wp_enqueue_media)
  - Modal content: wrap in <div class="wrap"> with <h2> heading
  - Always die() or wp_die() after rendering modal content to prevent extra output
  - Cancel button: use .thickbox-close class for auto-close behavior
  - AJAX in modal: check tb_iframe param to differentiate from standalone page load
  - Data passing: use URL query params (add_query_arg) to pass data to modal
  - Close from iframe: use window.parent.tb_remove()
  - Redirect parent: use window.parent.location.href after modal close
  - Sanitize all incoming params in modal
  - Admin page approach: register page + use tb_iframe=1 for modal variant
  - Always enqueue wp_enqueue_media() if thickbox JS/CSS needed
