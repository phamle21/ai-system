name: wordpress-router
description: Classify WordPress repos (plugin/theme/block theme/Gutenberg/WP core) and route to correct domain skill
version: 1.0
compatibility:
  wordpress: "6.9+"
  php: "7.2.24+"

when_to_use:
  - at start of WordPress tasks to identify repo type
  - selecting right workflow and guardrails
  - delegating to domain skill(s) based on repo kind and user intent

input:
  - repo_root: current working directory
  - user_intent: what user wants changed
  - constraints: WP version targets, WP.com specifics, release requirements

steps:
  - Run triage: node skills/wp-project-triage/scripts/detect_wp_project.mjs
  - Parse triage output for project.kind, tooling, tests, versions
  - Route to domain skills based on user intent + repo kind
  - Apply guardrails: confirm version constraints, prefer repo's existing tooling

rules:
  - Must always run triage before routing decisions
  - Must classify repo kind: wp-core | wp-plugin | wp-theme | wp-block-theme | wp-site | gutenberg
  - Must route based on user intent AND repo kind, not just one
  - Must never skip triage even if repo appears obvious
  - Must ask clarifying question if routing is ambiguous
  - Must confirm version constraints before making changes

output:
  type: analysis
  schema:
    repo_kind: string
    recommended_skills: string[]
    version_constraints: object
    clarification_needed: boolean
