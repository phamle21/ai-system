# ============================================================
# RULES
# ============================================================
rules:
  - Hook target: use admin_notices to render heading buttons (not admin_head — buttons need to be in content area)
  - Screen check: always check $screen->post_type matches target CPT and $screen->action !== 'add'
  - Container class: use <p class="add-new-h2"> to align with "Add New" button positioning
  - Button positioning: insert before "Add New" by using admin_notices callback (renders above content)
  - Nonce: always add wp_nonce_url() for state-changing actions (import, sync, delete, export)
  - Capability: check relevant capability before rendering (edit_posts, edit_others_posts, etc.)
  - AJAX pattern: use wp_ajax_{action} + check_ajax_referer + wp_send_json_success/wp_send_json_error
  - Thickbox: use tb_iframe=1 query param + width/height + full <div class="wrap"> in modal content
  - Enqueue: use admin_enqueue_scripts for admin JS/CSS, not wp_enqueue_scripts
  - Spinning: use WP spinner class for AJAX button feedback
  - Escape: all output must use esc_html(), esc_url(), esc_attr()
  - JRR convention: buttons in class-based modules under src/Modules/PostType/{CPT}/Admin/
