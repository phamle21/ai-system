name: wp-admin-page-heading
description: Add custom buttons and action elements to the page heading area (before/after "Add New") on WordPress CPT list screens
version: 1.0
source_patterns: jrr-core (mu-plugin), WordPress PHP 8.0+

when_to_use:
  - adding custom buttons next to "Add New" in CPT list pages
  - adding import/export/sync buttons on admin list screens
  - adding custom action links in the page heading area
  - rendering notices or labels in the heading area
  - injecting dropdown buttons or bulk action buttons beside "Add New"

# ============================================================
# PATTERN 1: BUTTON BESIDE "ADD NEW" — LINK STYLE
# ============================================================
#
# Class-based module:
#   src/Modules/PostType/{CPT}/Admin/{Name}Button.php
#
# Example: RaceImportButton, RaceSyncButton, RiderExportButton
#
# Structure:
#
#   class RaceImportButton {
#       private string $postType = 'jrr_race';
#
#       public function __construct() {
#           add_action('admin_notices', [$this, 'render_heading_button']);
#           add_action('admin_notices', [$this, 'render_import_modal']);
#       }
#
#       public function render_heading_button(): void {
#           $screen = get_current_screen();
#           if (!$screen) return;
#           if ($screen->post_type !== $this->postType) return;
#           if ($screen->action === 'add') return; // only on list page
#           if (!current_user_can('edit_posts')) return;
#
#           // Render button before "Add New"
#           echo '<p class="add-new-h2">';
#           printf(
#               '<a href="%s" class="button button-primary">%s</a>',
#               esc_url(wp_nonce_url(
#                   admin_url('edit.php?post_type=' . $this->postType . '&action=import'),
#                   'jrr_race_import'
#               )),
#               esc_html__('Import', 'textdomain')
#           );
#           echo '</p>';
#       }
#   }
#
# Key points:
# - Hook into admin_notices to render in the page heading area
# - Check $screen->post_type matches target CPT
# - Check $screen->action !== 'add' to only show on list pages
# - Use <p class="add-new-h2"> to align with "Add New" button
# - Add nonce for state-changing actions (import, sync, delete)
# - Capability check: use most restrictive relevant capability

