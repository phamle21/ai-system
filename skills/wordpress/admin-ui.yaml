# ============================================================
# PATTERN 5: WORKING WITH PODS
# ============================================================
#
# Pods fields are stored as post_meta / term_meta under the same key.
# Pods config lives in: pods-bootstrap/pods-config/{post_type|taxonomy}-{name}.json
#
# Accessing Pods fields:
#   // Via post meta (recommended, no Pods dependency)
#   $value = get_post_meta($post_id, 'field_name', true);
#   $value = get_term_meta($term_id, 'field_name', true);
#
#   // Via Pods API (if Pods is available)
#   $pod = pods('{post_type}', $post_id);
#   $value = $pod->field('field_name');
#
# Registering Pods fields in JSON config (pods-bootstrap/pods-config/):
#   {
#       "labels": {...},
#       "fields": {
#           "field_name": {
#               "label": "Field Label",
#               "type": "text",
#               "register_meta_integration": "0"
#           }
#       }
#   }
#
# Key points:
# - Pods fields are stored as post_meta/term_meta — use get_post_meta() to access
# - Check pods-bootstrap/pods-config/ for existing field definitions before adding new ones
# - Do NOT duplicate field definitions
# - register_meta_integration: "0" means Pods manages the field directly

# ============================================================
# RULES
# ============================================================
rules:
  - Metabox registration: use add_meta_boxes hook, check $screen->action !== 'add' to skip new-post screen
  - Metabox targeting: always check get_current_screen()->post_type matches target CPT
  - Metabox save: always check nonce + capability (current_user_can) before saving
  - AJAX handlers: use check_ajax_referer() for nonce, wp_send_json_success() / wp_send_json_error() for response
  - Post type column: use manage_{post_type}_posts_columns (FILTER) + manage_{post_type}_posts_custom_column (ACTION, 2 params)
  - Taxonomy column: use manage_edit-{taxonomy}_columns (FILTER) + manage_{taxonomy}_custom_column (FILTER, 3 params with $content)
  - Column positioning: never replace $columns array, always merge/insert by position
  - Filter dropdown: use restrict_manage_posts (post type) or restrict_manage_terms (taxonomy), class="postform"
  - Filter query: check is_main_query() + is_admin() + $pagenow in pre_get_posts callback
  - Always escape output: esc_html(), esc_attr(), esc_url()
  - Empty value convention: <span style="opacity:.6">—</span>
  - Pods: use get_post_meta/get_term_meta to access fields, never duplicate Pod definitions

