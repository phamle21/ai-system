# ============================================================
#
# Class-based module:
#   src/Modules/PostType/{CPT}/List/{Name}Column.php
#
# Example: RiderSeasonColumn
#
# Structure:
#
#   final class RiderSeasonColumn {
#       private string $postType = 'rider';
#       private string $taxonomy = 'jrr_season';
#
#       public function __construct() {
#           add_filter("manage_{$this->postType}_posts_columns", [$this, 'addColumn']);
#           add_action("manage_{$this->postType}_posts_custom_column", [$this, 'renderColumn'], 10, 2);
#       }
#
#       public function addColumn(array $columns): array {
#           $new = [];
#           foreach ($columns as $key => $label) {
#               $new[$key] = $label;
#               // chèn sau title column
#               if ($key === 'title') {
#                   $new['column_slug'] = __('Column Label', 'textdomain');
#               }
#           }
#           // fallback nếu không có title
#           if (!isset($new['column_slug'])) {
#               $new['column_slug'] = __('Column Label', 'textdomain');
#           }
#           return $new;
#       }
#
#       public function renderColumn(string $column, int $postId): void {
#           if ($column !== 'column_slug') return;
#
#           // Lấy dữ liệu từ meta, taxonomy, hoặc Pods
#           $terms = get_the_terms($postId, 'jrr_season');
#           if (!empty($terms) && !is_wp_error($terms)) {
#               echo esc_html(implode(', ', wp_list_pluck($terms, 'name')));
#           } else {
#               echo '<span style="opacity:.6">—</span>';
#           }
#       }
#   }
#
# Key points:
# - Use manage_{post_type}_posts_columns (FILTER) to add column definition
# - Use manage_{post_type}_posts_custom_column (ACTION) to render content
# - Loop and insert positionally (after 'title' or other anchor column)
# - Never replace $columns array — always merge/insert
# - Escape ALL output: esc_html(), esc_attr(), esc_url()
# - Use <span style="opacity:.6">—</span> for empty values (JRR convention)

