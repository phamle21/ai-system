name: wp-admin-ui
description: WordPress admin UI — metaboxes, columns, filters for post types and taxonomies
version: 1.0
source_patterns: jrr-core (mu-plugin), WordPress PHP 8.0+

when_to_use:
  - adding custom metaboxes to post type or taxonomy edit screens
  - adding custom columns to admin list tables (posts or terms)
  - adding custom dropdown filters to admin list tables
  - saving metabox data with nonce and capability checks
  - rendering custom column content with data from meta/taxonomy
  - filtering post/term lists by taxonomy or meta values
  - working alongside Pods framework for CPT fields

# ============================================================
# PATTERN 1: METABOX
# ============================================================
#
# Class-based module in jrr-core:
#   src/Modules/PostType/{CPT}/Metabox/{Name}Metabox.php
#
# Example: RiderSeasonTabsMetabox, RaceResultsImportMetabox,
#          RaceStandingImportMetabox, RiderCommentsMetabox
#
# Structure:
#
#   final class RaceResultsImportMetabox {
#       public function __construct() {
#           add_action('add_meta_boxes', [$this, 'register_metabox']);
#           add_action('admin_enqueue_scripts', [$this, 'scripts']);
#           add_action('wp_ajax_{action}', [$this, 'ajax_handler']);
#       }
#
#       public function register_metabox(): void {
#           $screen = get_current_screen();
#           if (!$screen) return;
#           if (($screen->action ?? '') === 'add') return; // hide on Add screen
#
#           add_meta_box(
#               'jrr_{slug}',
#               __('Title', 'textdomain'),
#               [$this, 'render_metabox'],
#               '{post_type}',
#               'normal',       // normal | advanced | side
#               'high'          // high | default | low
#           );
#       }
#
#       public function render_metabox(\WP_Post $post): void {
#           $data = get_post_meta($post->ID, '{meta_key}', true);
#           // Escape all output
#           echo esc_html($data);
#       }
#
#       public function save(int $post_id): void {
#           if (!isset($_POST['{nonce_field}'])
#               || !wp_verify_nonce($_POST['{nonce_field}'], '{nonce_action}')) {
#               return;
#           }
#           if (!current_user_can('edit_post', $post_id)) {
#               return;
#           }
#           // Sanitize and save
#           update_post_meta($post_id, '{meta_key}', sanitize_text_field($_POST['field']));
#       }
#   }
#
# Key points:
# - Always check $screen->action === 'add' to skip metabox on new post screen
# - Always check get_current_screen()->post_type to target correct CPT
# - Use add_meta_boxes (generic) or add_meta_boxes_{post_type} (specific) hook
# - AJAX handlers: wp_ajax_{action} (logged-in) + wp_ajax_nopriv_{action} (optional)
# - Create nonce with wp_create_nonce('{action}') and verify with wp_verify_nonce()
# - Use check_ajax_referer() inside AJAX handlers
# - Enqueue scripts via admin_enqueue_scripts, localize with wp_localize_script()
# - Render views via require() or inline HTML with proper escaping

