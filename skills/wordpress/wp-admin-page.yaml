name: wp-admin-page
description: Create custom admin pages, sub-menus, and settings pages in WordPress wp-admin
version: 1.0

when_to_use:
  - adding custom admin menu pages for plugins
  - creating sub-menus under existing menu items
  - settings pages with Settings API (register_setting, add_settings_section)
  - custom admin pages with forms and data display
  - integrating with WordPress settings system
  - adding sub-menus under native CPT pages

