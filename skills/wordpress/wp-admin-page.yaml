# ============================================================
# RULES
# ============================================================
rules:
  - Menu registration: hook into admin_menu action, not in constructor
  - Settings: register_setting() on admin_init, not in constructor
  - Capability: use most restrictive capability needed per page
  - Settings API: use settings_fields() + do_settings_sections() in form, not manual nonce
  - Sanitize: sanitize_callback in register_setting handles form field sanitization
  - Redirection: always redirect after POST action (PRG pattern) to prevent re-submission
  - Unique slug: menu_slug must be unique across all plugins
  - Icon: dashicons or base64 SVG for menu icons
  - Nonce: manual forms need wp_nonce_field() + wp_verify_nonce() — Settings API handles it
  - Settings updated notice: check isset($_GET['settings-updated']) for success message
