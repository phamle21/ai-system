# ============================================================
# RULES
# ============================================================
rules:
  - wp_ajax_{action} hook for logged-in users, wp_ajax_nopriv_{action} for public (use sparingly)
  - check_ajax_referer() stops on failure with 400 — do NOT use both check_ajax_referer AND manual nonce verify
  - wp_send_json_success($data) sends 200 + {success: true, data: $data}
  - wp_send_json_error($data) sends 400 + {success: false, data: $data}
  - ajaxurl is global in admin — do NOT hardcode admin-ajax.php
  - Always use nonce for state-changing actions (create, update, delete, import, sync)
  - Sanitize all $_POST input: (int) casts, sanitize_text_field(), sanitize_email(), etc.
  - Debounce search inputs (300ms standard) to reduce AJAX calls
  - Abort previous XHR before sending new request to prevent race conditions
  - Use FormData with processData: false, contentType: false for file uploads
  - Disable submit button during AJAX to prevent double-submission
  - Spinner class provides WP-style loading indicator
