name: wp-editor
description: WordPress Editor (wp_editor), TinyMCE, media uploader, and shortcode UI in wp-admin
version: 1.0

when_to_use:
  - adding wp_editor() fields to metaboxes or admin pages
  - configuring editor settings: toolbar levels, media buttons, tinymce
  - enqueueing editor assets and custom CSS for content area
  - using WordPress Media Uploader in custom admin screens
  - building shortcode attribute UIs
  - sanitizing/escaping editor content

# ============================================================
# PATTERN 1: BASIC WP_EDITOR IN METABOX
# ============================================================
#
# File: includes/Modules/{CPT}/Metabox/{Name}Editor.php
#
# class MyCptContentEditor {
#     public function render(\WP_Post $post): void {
#         $content = get_post_meta($post->ID, 'my_cpt_content', true);
#         wp_editor(
#             $content,
#             'my_cpt_content',
#             [
#                 'textarea_name'  => 'my_cpt_content',
#                 'textarea_rows'  => 10,
#                 'media_buttons'  => true,
#                 'teeny'          => false,
#                 'quicktags'      => true,
#                 'editor_css'     => '<style>.mce-content-body { font-family: sans-serif; }</style>',
#                 'editor_class'   => 'my-editor-custom',
#             ]
#         );
#     }
# }
#
# Key points:
# - wp_editor() renders both Classic and Gutenberg editors based on user preference
# - textarea_name controls form submission key (different from editor_id)
# - Always provide editor_css for consistent content area styling
# - media_buttons: true allows inserting media from library
# - teeny: true for simplified toolbar (fewer buttons)
# - quicktags: true shows HTML/Text tab bar

