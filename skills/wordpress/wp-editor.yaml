# ============================================================
# RULES
# ============================================================
rules:
  - wp_editor() is the standard — do not build custom textareas for rich content
  - textarea_name controls form submission key (different from editor_id)
  - Always provide editor_css to style content area for consistency
  - media_buttons: true requires wp_enqueue_media() on admin_enqueue_scripts
  - Reuse media frame JS instance to avoid conflicts in same session
  - TinyMCE: define toolbar1-4 explicitly, menubar=false, branding=false
  - Sanitize editor content with wp_kses() — define allowed_tags array
  - On output: echo editor content directly, do NOT use esc_html()
  - Shortcode UI: use form-table for attribute builder, shortcode_atts() for merging
  - enqueue media via admin_enqueue_scripts, not wp_enqueue_scripts
