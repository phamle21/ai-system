name: wp-admin-heading-btn
description: Add custom buttons, actions, and labels to the page heading area (beside "Add New") on WordPress CPT/taxonomy list screens
version: 1.0

when_to_use:
  - adding custom buttons beside "Add New" in CPT list pages
  - adding import/export/sync buttons on admin list screens
  - adding custom action links or labels in the page heading area
  - injecting dropdown buttons or bulk action buttons beside "Add New"
  - showing post count or info text in heading area

