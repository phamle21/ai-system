# ============================================================
# RULES
# ============================================================
rules:
  - Hook target: use admin_notices (not admin_head) — buttons render in content area above "Add New"
  - Screen check: always verify $screen->post_type matches target CPT and $screen->action !== 'add'
  - Container class: use <p class="add-new-h2"> to align with "Add New" button
  - Nonce: always add wp_nonce_url() for state-changing actions (import, sync, delete, export)
  - Capability: check relevant capability before rendering
  - Enqueue: use admin_enqueue_scripts for admin JS/CSS (not wp_enqueue_scripts)
  - Spinning: use WP spinner class for AJAX button feedback
  - Escape: all output must use esc_html(), esc_url(), esc_attr()
  - For AJAX: use wp_ajax_{action} + check_ajax_referer + wp_send_json_success/error
