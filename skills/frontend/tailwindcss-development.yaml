## BEST PRACTICES

- Use `gap` utilities instead of margins for spacing between siblings
- Remove redundant classes
- Extract repeated patterns into reusable components (Blade components)
- Consider responsive breakpoints: `sm:`, `md:`, `lg:`, `xl:`
- Follow project conventions first — check existing classes before introducing new patterns

## COMMON PITFALLS

- Using deprecated v3 utilities (bg-opacity-*, flex-shrink-*, etc.)
- Using `@tailwind` directives instead of `@import "tailwindcss"`
- Trying to use `tailwind.config.js` instead of CSS `@theme` directive
- Using margins for spacing between siblings instead of gap utilities
- Forgetting to add dark mode variants when the project uses dark mode

---

## OUTPUT

- HTML/Blade markup with Tailwind CSS utility classes
- CSS with `@theme` directive for custom values (if needed)
