name: design-system
description: Color palette, typography scale, spacing system, and CSS variables for pixel-perfect UI implementation
version: 1.0

---

## CONTEXT

Design system for Daily Logwork application. All values derived from DAILY_REPORT_EXACT_SPEC.md.

---

## COLOR PALETTE

### Backgrounds
| Token | Tailwind | Hex |
|-------|----------|-----|
| Page bg | bg-slate-50 | #F8FAFC |
| Card bg | bg-white | #FFFFFF |
| Card hover | hover:bg-slate-50 | #F8FAFC |
| Subtle hover | hover:bg-slate-50 | #F1F5F9 |

### Text
| Token | Tailwind | Hex |
|-------|----------|-----|
| Primary | text-slate-900 | #0F172A |
| Secondary | text-slate-600 | #475569 |
| Tertiary | text-slate-500 | #64748B |
| Muted | text-slate-400 | #A0AEC0 |

### Interactive
| Token | Tailwind | Hex |
|-------|----------|-----|
| Primary btn | bg-blue-600 | #2563EB |
| Primary hover | hover:bg-blue-700 | #1D4ED8 |
| Delete | text-red-600 | #DC2626 |
| Delete hover bg | hover:bg-red-50 | #FEE2E2 |
| Focus border | border-blue-500 | #3B82F6 |
| Focus ring | ring-blue-100 | #DBEAFE |

### Borders
| Token | Tailwind | Hex |
|-------|----------|-----|
| Default | border-slate-200 | #E2E8F0 |
