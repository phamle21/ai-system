---

## TYPOGRAPHY

| Element | Classes | Size | Weight | Color |
|---------|---------|------|--------|-------|
| Page title | text-3xl font-bold | 1.875rem | 700 | text-slate-900 |
| Card title | text-xl font-semibold | 1.25rem | 600 | text-slate-900 |
| Card description | text-sm text-slate-500 | 0.875rem | 400 | text-slate-500 |
| Label | text-sm font-medium | 0.875rem | 500 | text-slate-700 |
| Body | text-sm | 0.875rem | 400 | text-slate-900 |
| Placeholder | text-sm italic text-slate-400 | 0.875rem | 400 italic | text-slate-400 |
| Compact heading | text-2xl font-bold | 1.5rem | 700 | text-slate-900 |
| Compact card title | text-lg font-semibold | 1.125rem | 600 | text-slate-900 |
| Compact body | text-xs | 0.75rem | 400 | text-slate-900 |

## SPACING

| Element | Full | Compact |
|---------|------|---------|
| Page container | max-w-4xl mx-auto px-4 py-8 | max-w-3xl mx-auto px-3 py-4 |
| Card padding | px-6 py-4 | px-3 py-3 |
| Card header | px-6 py-4 | px-3 py-3 |
| Section gap | space-y-6 | space-y-3 |
| Task list gap | space-y-2 | space-y-1.5 |
| Task row padding | p-2 | p-1.5 |
| Task row gap | gap-2 sm:gap-3 | gap-1.5 sm:gap-2 |
| Form label margin | mb-2 | mb-1.5 |
| Input height | h-9 | h-8 |
| Button height | h-10 | h-8 |

## SIZING

| Element | Width | Height | Classes |
|---------|-------|--------|---------|
| Input | flex-1 | h-9 | w-full h-9 |
| Progress select | w-20 | h-9 | w-20 h-9 |
| Date input | w-32 | h-9 | w-32 h-9 |
| Project select | flex-1 | h-9 | flex-1 h-9 |
| Primary button | auto | h-10 | px-6 py-2.5 h-10 |
| Secondary button | auto | h-9 | px-4 py-2 h-9 |
| Delete icon | w-9 | h-9 | h-9 w-9 |
| Rating button | flex-1 | h-10 | flex-1 h-10 |
| Textarea | w-full | min-h-24 | min-h-24 |
| Logo | w-16 | h-16 | w-16 h-16 |
| Icons | 16x16 | 16x16 | w-4 h-4 |

## TRANSITIONS

| Element | Transition |
|---------|-----------|
| General | transition-all duration-200 |
| Buttons | transition-all duration-150 |
| Delete button | opacity-0 group-hover:opacity-100 transition-opacity duration-200 |
| Rating buttons | transition-all duration-150 |
| Toggle switch | transition-colors duration-200 |

## ICONS

| Icon | Size | Default Color | Hover Color | Usage |
|------|------|--------------|-------------|-------|
| GripVertical | w-4 h-4 | text-slate-400 | text-slate-600 | Drag handle |
| Trash2 | w-4 h-4 | text-red-600 | text-red-700 | Delete |
| Plus | w-3 h-3 | inherit | inherit | Add items |
| HistoryIcon | w-5 h-5 | text-blue-600 | text-blue-700 | Navigation |
