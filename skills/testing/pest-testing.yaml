name: pest-testing
description: Use for Pest PHP testing in Laravel projects. Trigger when tests are being written, edited, fixed, or refactored. Covers test()/it()/expect() syntax, datasets, mocking, browser testing, smoke testing, architecture tests, and Livewire component testing.
version: 1.0

---

## CONTEXT

Pest 4 with Laravel 13. Daily Logwork uses Pest PHP 4.6 with Laravel plugin.

---

## BASIC USAGE

### Creating Tests
```bash
php artisan make:test --pest {name}
```

### Test Organization
- Unit tests: `tests/Unit/`
- Feature tests: `tests/Feature/`
- Browser tests: `tests/Browser/`

### Basic Test Structure
Use `test()` if existing tests use `test()`, or `it()` if they use `it()`. Check existing test files first.

```php
test('example', function () {
    expect(true)->toBeTrue();
});

// or

it('has homepage', function () {
    $response = get('/');
    $response->assertSuccessful();
});
```

### Running Tests
```bash
php artisan test --compact                                    # All tests
php artisan test --compact --filter=testName                  # Filter
php artisan test --compact tests/Feature/ExampleTest.php      # Single file
```

---

## ASSERTIONS

### Prefer Specific Assertions

| Use | Instead of |
|-----|------------|
| `assertSuccessful()` | `assertStatus(200)` |
| `assertNotFound()` | `assertStatus(404)` |
| `assertForbidden()` | `assertStatus(403)` |
| `assertRedirect()` | `assertStatus(302)` |
| `assertSessionHas()` | `assertSessionHasErrors()` (when checking specific key) |

```php
test('returns all items', function () {
    $response = $this->getJson('/api/docs');
    $response->assertSuccessful();
});
```

### Model Assertions
```php
use function PHPUnit\Framework\assertDatabaseHas;
use function PHPUnit\Framework\assertModelMissing;

test('creates report', function () {
    $report = DailyReport::factory()->create();
    assertModelExists($report);
});
```

