## DATASETS

For repetitive tests (validation rules, etc.):

```php
test('validation rules', function (string $field, array $rules) {
    $response = post('/api/endpoint', [$field => 'invalid']);
    $response->assertSessionHasErrors([$field => $rules]);
})->with([
    'name required' => ['name', 'required|string|max:255'],
    'email required' => ['email', 'required|email'],
    'email format' => ['email', 'not_an_email'],
]);
```

