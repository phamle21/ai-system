## LARAVEL TESTING

### Mocking
```php
use function Pest\Laravel\mock;

test('send notification', function () {
    mock(Notifier::class, function (MockInterface $mock) {
        $mock->shouldReceive('notify')->once();
    });
});
```

### Fakes
```php
test('sends email on registration', function () {
    Event::fake();
    Notification::fake();
    Mail::fake();

    $user = User::factory()->create();

    // Trigger action...

    Event::assertDispatched(UserRegistered::class);
    Notification::assertSentTo($user, WelcomeNotification::class);
    Mail::assertSent(WelcomeEmail::class);
});
```

### Factories
```php
use function Pest\Laravel\assertDatabaseCount;

test('list reports', function () {
    DailyReport::factory()->count(5)->create();

    $this->get('/reports')
        ->assertSuccessful()
        ->assertViewIs('reports.index')
        ->assertSee('Report 1');

    assertDatabaseCount('daily_reports', 5);
});
```

### Refresh Database
```php
use Illuminate\Foundation\Testing\RefreshDatabase;

it('creates user', function () {
    $this->withoutExceptionHandling();

    $data = User::factory()->raw();
    post('/register', $data)
        ->assertRedirect('/dashboard');

    assertDatabaseHas('users', ['email' => $data['email']]);
});
```

