## LIVERWIRE TESTING

```php
use function Pest\Livewire\livewire;

test('can add task', function () {
    livewire(DailyReport\Index::class)
        ->assertSet('todayTasks', [])
        ->call('addTodayTask')
        ->assertSet('todayTasks.0.description', '')
        ->assertSet('todayTasks.0.progress', 0);
});

test('can save report', function () {
    livewire(DailyReport\Index::class)
        ->set('project', 'Project A')
        ->set('reportDate', today()->toDateString())
        ->set('qualityRating', 4)
        ->call('save')
        ->assertHasNoErrors()
        ->assertRedirect();
});
```

