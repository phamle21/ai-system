## ARCHITECTURE TESTING

```php
arch('controllers')
    ->expect('App\Http\Controllers')
    ->toExtendNothing()
    ->toHaveSuffix('Controller');

arch('models')
    ->expect('App\Models')
    ->toExtend(Model::class)
    ->toHaveProperties();
```

---

## BEST PRACTICES

- Use `LazilyRefreshDatabase` over `RefreshDatabase` for speed
- `assertModelExists()` over raw `assertDatabaseHas()`
- Factory sequences for shared test data with `recycle()`
- Call `Event::fake()` AFTER factory setup, not before
- Use `Exceptions::fake()` for expected exceptions
- Never delete tests without approval — they are core application code

## COMMON PITFALLS

- Not importing `use function Pest\Laravel\mock;` before using mock
- Using `assertStatus(200)` instead of `assertSuccessful()`
- Forgetting datasets for repetitive validation tests
- Deleting tests without approval
- Forgetting `assertNoJavaScriptErrors()` in browser tests

---

## OUTPUT

- Pest PHP test file with `test()` or `it()` blocks
